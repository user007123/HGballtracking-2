<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HoverGreens Ball Tracker Test</title>
<style>
  body {
    background: #000;
    color: #0f0;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 10px;
  }

  button, select {
    margin: 6px;
    padding: 8px 12px;
    background: #000;
    border: 1px solid #0f0;
    color: #0f0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }

  #status, #score {
    margin: 8px;
    font-size: 18px;
  }

  #controls {
    margin-bottom: 10px;
  }

  video {
    display: none;
  }

  canvas {
    display: block;
    margin: 6px auto;
    background: #000;
    border: 1px solid #0f0;
  }
</style>
</head>
<body>

<div id="controls">
  <button id="reset">Reset</button>
  <button id="refreshCams">Refresh Cameras</button>
  <select id="cameraSelect"></select>
  <button id="startCam">Start Selected Camera</button>
</div>

<div id="status">Starting camera…</div>
<div id="score">Score: 0</div>

<video id="cam" autoplay playsinline muted></video>
<canvas id="view" width="960" height="540"></canvas>

<script>
const video = document.getElementById("cam");
const canvas = document.getElementById("view");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const statusEl = document.getElementById("status");
const scoreEl = document.getElementById("score");
const resetBtn = document.getElementById("reset");
const cameraSelect = document.getElementById("cameraSelect");
const refreshCamsBtn = document.getElementById("refreshCams");
const startCamBtn = document.getElementById("startCam");

// =========================
// SETTINGS
// =========================
const START_CIRCLE = {
  x: canvas.width - 120,
  y: canvas.height / 2,
  r: 38
};

const TARGET_CIRCLE = {
  x: 120,
  y: canvas.height / 2,
  r: 40
};

// White ball detection
const BRIGHT_MIN = 135;
const SAT_MAX = 80;
const MIN_PIXELS = 8;
const MAX_RATIO = 2.3;

// Ready lock
const READY_LOCK_MS = 450;
const READY_STABLE_MOVE = 10;

// Tracking
const SEARCH_RADIUS = 110;
const LOST_FRAMES_MAX = 10;
const MAX_JUMP = 65;

// Locked-ball model matching
const SIZE_TOLERANCE_W = 1.8;
const SIZE_TOLERANCE_H = 1.8;
const PIXELCOUNT_SCALE_MAX = 2.4;
const PIXELCOUNT_SCALE_MIN = 0.20;

// Motion / stop logic
const MOTION_START_DISTANCE = 8;
const MIN_TRAIL_POINT_DIST = 2;
const STOP_MOVE_THRESHOLD = 2.0;   // px considered "not moving"
const STOP_FRAMES_REQUIRED = 8;    // consecutive frames before considered stopped
const REARM_DELAY_MS = 6000;       // wait 6 sec after stop

// =========================
// STATES
// =========================
const STATE_ARMED = "ARMED";             // waiting for ball in start circle
const STATE_LOCKED = "LOCKED";           // ball locked, waiting for motion
const STATE_TRACKING = "TRACKING";       // ball moving
const STATE_STOPPED = "STOPPED";         // ball stopped, display frozen
const STATE_REARM_WAIT = "REARM_WAIT";   // 6-second cooldown before rearming

let state = STATE_ARMED;

// =========================
// STATE / DATA
// =========================
let currentStream = null;
let animationStarted = false;

let score = 0;
let targetHit = false;

let readyLockStart = null;
let readyReference = null;

let lostFrames = 0;
let stopCounter = 0;
let rearmStartTime = null;

let lockPos = null;
let lastPos = null;
let trail = [];

let lockedBallModel = null;

// =========================
// CAMERA SETUP
// =========================
async function initCameraAccess() {
  try {
    const tempStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    currentStream = tempStream;
    video.srcObject = tempStream;

    await new Promise(resolve => {
      video.onloadedmetadata = () => {
        video.play();
        resolve();
      };
    });

    await populateCameraList();

    if (!animationStarted) {
      animationStarted = true;
      requestAnimationFrame(loop);
    }

    statusEl.textContent = "Place ball in START circle and hold steady";
  } catch (err) {
    statusEl.textContent = "Camera error: " + err.message;
  }
}

async function populateCameraList() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === "videoinput");

    cameraSelect.innerHTML = "";

    videoDevices.forEach((device, index) => {
      const option = document.createElement("option");
      option.value = device.deviceId;
      option.textContent = device.label || `Camera ${index + 1}`;
      cameraSelect.appendChild(option);
    });

    if (videoDevices.length === 0) {
      const option = document.createElement("option");
      option.textContent = "No cameras found";
      option.value = "";
      cameraSelect.appendChild(option);
    }
  } catch (err) {
    statusEl.textContent = "Could not list cameras: " + err.message;
  }
}

async function startSelectedCamera() {
  const deviceId = cameraSelect.value;
  if (!deviceId) {
    statusEl.textContent = "No camera selected";
    return;
  }

  try {
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        deviceId: { exact: deviceId },
        width: { ideal: 1280 },
        height: { ideal: 720 },
        frameRate: { ideal: 60, max: 60 }
      },
      audio: false
    });

    currentStream = stream;
    video.srcObject = stream;

    await new Promise(resolve => {
      video.onloadedmetadata = () => {
        video.play();
        resolve();
      };
    });

    resetTrackingSystem();
    statusEl.textContent = "Camera switched — place ball in START circle and hold steady";
  } catch (err) {
    statusEl.textContent = "Could not start selected camera: " + err.message;
  }
}

// =========================
// RESET
// =========================
function resetTrackingSystem() {
  state = STATE_ARMED;
  readyLockStart = null;
  readyReference = null;
  lostFrames = 0;
  stopCounter = 0;
  rearmStartTime = null;
  lockPos = null;
  lastPos = null;
  trail = [];
  lockedBallModel = null;
  targetHit = false;
}

resetBtn.onclick = () => {
  resetTrackingSystem();
  statusEl.textContent = "Reset — place ball in START circle and hold steady";
  updateScore();
};

refreshCamsBtn.onclick = async () => {
  await populateCameraList();
  statusEl.textContent = "Camera list refreshed";
};

startCamBtn.onclick = async () => {
  await startSelectedCamera();
};

// =========================
// HELPERS
// =========================
function updateScore() {
  scoreEl.textContent = `Score: ${score}`;
}

function dist(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

function isWhiteLike(r, g, b) {
  const bright = (r + g + b) / 3;
  const sat = Math.max(r, g, b) - Math.min(r, g, b);
  return bright >= BRIGHT_MIN && sat <= SAT_MAX;
}

function freezeCurrentFrame() {
  // no-op placeholder if you later want to save image data
}

function findBlobs(searchArea = null) {
  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = frame.data;

  const minX = searchArea ? Math.max(0, Math.floor(searchArea.x - searchArea.r)) : 0;
  const maxX = searchArea ? Math.min(canvas.width - 1, Math.floor(searchArea.x + searchArea.r)) : canvas.width - 1;
  const minY = searchArea ? Math.max(0, Math.floor(searchArea.y - searchArea.r)) : 0;
  const maxY = searchArea ? Math.min(canvas.height - 1, Math.floor(searchArea.y + searchArea.r)) : canvas.height - 1;

  const w = maxX - minX + 1;
  const h = maxY - minY + 1;

  if (w <= 0 || h <= 0) return [];

  const mask = new Uint8Array(w * h);
  const visited = new Uint8Array(w * h);

  for (let y = minY; y <= maxY; y++) {
    for (let x = minX; x <= maxX; x++) {
      if (searchArea && dist(x, y, searchArea.x, searchArea.y) > searchArea.r) continue;

      const i = (y * canvas.width + x) * 4;
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      if (isWhiteLike(r, g, b)) {
        mask[(y - minY) * w + (x - minX)] = 1;
      }
    }
  }

  const blobs = [];
  const stack = [];

  for (let sy = 0; sy < h; sy++) {
    for (let sx = 0; sx < w; sx++) {
      const idx = sy * w + sx;
      if (!mask[idx] || visited[idx]) continue;

      let count = 0;
      let sumX = 0;
      let sumY = 0;
      let boxMinX = Infinity, boxMaxX = -Infinity;
      let boxMinY = Infinity, boxMaxY = -Infinity;

      visited[idx] = 1;
      stack.push([sx, sy]);

      while (stack.length) {
        const [cx, cy] = stack.pop();
        const gx = minX + cx;
        const gy = minY + cy;

        count++;
        sumX += gx;
        sumY += gy;

        if (gx < boxMinX) boxMinX = gx;
        if (gx > boxMaxX) boxMaxX = gx;
        if (gy < boxMinY) boxMinY = gy;
        if (gy > boxMaxY) boxMaxY = gy;

        const neighbors = [
          [cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1],
          [cx + 1, cy + 1], [cx - 1, cy - 1], [cx + 1, cy - 1], [cx - 1, cy + 1]
        ];

        for (const [nx, ny] of neighbors) {
          if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
          const nIdx = ny * w + nx;
          if (!mask[nIdx] || visited[nIdx]) continue;
          visited[nIdx] = 1;
          stack.push([nx, ny]);
        }
      }

      if (count >= MIN_PIXELS) {
        const bw = Math.max(1, boxMaxX - boxMinX);
        const bh = Math.max(1, boxMaxY - boxMinY);
        const ratio = bw > bh ? bw / bh : bh / bw;

        if (ratio <= MAX_RATIO) {
          blobs.push({
            x: sumX / count,
            y: sumY / count,
            count,
            w: bw,
            h: bh,
            ratio,
            areaScore: bw * bh
          });
        }
      }
    }
  }

  return blobs;
}

function scoreBlobForLock(blob) {
  const d = dist(blob.x, blob.y, START_CIRCLE.x, START_CIRCLE.y);
  const ratioPenalty = Math.abs(1 - (blob.w / Math.max(blob.h, 1))) * 20;
  return d + ratioPenalty + blob.areaScore * 0.03;
}

function chooseLockBlob(blobs) {
  if (!blobs.length) return null;

  let best = null;
  let bestScore = Infinity;

  for (const blob of blobs) {
    const d = dist(blob.x, blob.y, START_CIRCLE.x, START_CIRCLE.y);
    if (d > START_CIRCLE.r + 10) continue;

    const s = scoreBlobForLock(blob);
    if (s < bestScore) {
      bestScore = s;
      best = blob;
    }
  }

  return best;
}

function scoreBlobForTracking(blob) {
  if (!lockedBallModel || !lastPos) return Infinity;

  const moveDist = dist(blob.x, blob.y, lastPos.x, lastPos.y);
  const wDiff = Math.abs(blob.w - lockedBallModel.w) / Math.max(lockedBallModel.w, 1);
  const hDiff = Math.abs(blob.h - lockedBallModel.h) / Math.max(lockedBallModel.h, 1);
  const cDiff = Math.abs(blob.count - lockedBallModel.count) / Math.max(lockedBallModel.count, 1);
  const ratioDiff = Math.abs(blob.ratio - lockedBallModel.ratio);

  return moveDist + (wDiff * 25) + (hDiff * 25) + (cDiff * 15) + (ratioDiff * 15);
}

function chooseTrackingBlob(blobs) {
  if (!blobs.length || !lockedBallModel || !lastPos) return null;

  let best = null;
  let bestScore = Infinity;

  for (const blob of blobs) {
    if (blob.w > lockedBallModel.w * SIZE_TOLERANCE_W) continue;
    if (blob.h > lockedBallModel.h * SIZE_TOLERANCE_H) continue;
    if (blob.count > lockedBallModel.count * PIXELCOUNT_SCALE_MAX) continue;
    if (blob.count < lockedBallModel.count * PIXELCOUNT_SCALE_MIN) continue;

    const jump = dist(blob.x, blob.y, lastPos.x, lastPos.y);
    if (jump > MAX_JUMP) continue;

    const s = scoreBlobForTracking(blob);
    if (s < bestScore) {
      bestScore = s;
      best = blob;
    }
  }

  return best;
}

function drawStartCircle() {
  let color = "#00ff00";
  let text = "START";

  if (state === STATE_ARMED && readyLockStart) {
    color = "#ffff00";
    text = "READY";
  } else if (state === STATE_LOCKED) {
    color = "#00ffff";
    text = "LOCKED";
  } else if (state === STATE_TRACKING) {
    color = "#555555";
    text = "BUSY";
  } else if (state === STATE_STOPPED || state === STATE_REARM_WAIT) {
    color = "#555555";
    text = "WAIT";
  }

  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(START_CIRCLE.x, START_CIRCLE.y, START_CIRCLE.r, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = color;
  ctx.font = "16px Arial";
  ctx.fillText(text, START_CIRCLE.x - 28, START_CIRCLE.y - 48);
}

function drawTargetCircle() {
  ctx.strokeStyle = targetHit ? "#ff0000" : "#00ff00";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(TARGET_CIRCLE.x, TARGET_CIRCLE.y, TARGET_CIRCLE.r, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = targetHit ? "#ff0000" : "#00ff00";
  ctx.font = "16px Arial";
  ctx.fillText("TARGET", TARGET_CIRCLE.x - 34, TARGET_CIRCLE.y - 52);
}

function drawTrail() {
  if (trail.length < 2) return;
  ctx.strokeStyle = "#00ff00";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(trail[0].x, trail[0].y);
  for (let i = 1; i < trail.length; i++) {
    ctx.lineTo(trail[i].x, trail[i].y);
  }
  ctx.stroke();
}

function drawTrackedPoint(pos) {
  if (!pos) return;
  ctx.fillStyle = "#00ff00";
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 6, 0, Math.PI * 2);
  ctx.fill();
}

function drawReadyProgress() {
  if (!(state === STATE_ARMED && readyLockStart)) return;

  const elapsed = performance.now() - readyLockStart;
  const progress = Math.max(0, Math.min(1, elapsed / READY_LOCK_MS));

  const barW = 140;
  const barH = 10;
  const x = START_CIRCLE.x - barW / 2;
  const y = START_CIRCLE.y + START_CIRCLE.r + 18;

  ctx.strokeStyle = "#00ff00";
  ctx.strokeRect(x, y, barW, barH);

  ctx.fillStyle = "#ffff00";
  ctx.fillRect(x, y, barW * progress, barH);
}

function drawRearmProgress() {
  if (state !== STATE_REARM_WAIT || rearmStartTime === null) return;

  const elapsed = performance.now() - rearmStartTime;
  const progress = Math.max(0, Math.min(1, elapsed / REARM_DELAY_MS));

  const barW = 180;
  const barH = 10;
  const x = (canvas.width / 2) - (barW / 2);
  const y = 20;

  ctx.strokeStyle = "#00ff00";
  ctx.strokeRect(x, y, barW, barH);

  ctx.fillStyle = "#00ffff";
  ctx.fillRect(x, y, barW * progress, barH);
}

function checkTargetHit(pos) {
  if (targetHit) return;

  const d = dist(pos.x, pos.y, TARGET_CIRCLE.x, TARGET_CIRCLE.y);
  if (d <= TARGET_CIRCLE.r) {
    targetHit = true;
    score++;
    updateScore();
    statusEl.textContent = "Point scored!";
  }
}

// =========================
// MAIN LOOP
// =========================
function loop() {
  requestAnimationFrame(loop);

  if (!video.videoWidth || !video.videoHeight) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  drawStartCircle();
  drawTargetCircle();
  drawTrail();
  drawReadyProgress();
  drawRearmProgress();

  // -------------------------
  // STATE: ARMED
  // -------------------------
  if (state === STATE_ARMED) {
    const blobs = findBlobs({
      x: START_CIRCLE.x,
      y: START_CIRCLE.y,
      r: START_CIRCLE.r + 26
    });

    const candidate = chooseLockBlob(blobs);

    if (candidate) {
      drawTrackedPoint(candidate);

      if (!readyLockStart) {
        readyLockStart = performance.now();
        readyReference = { x: candidate.x, y: candidate.y };
        statusEl.textContent = "Ball detected — hold steady for lock";
      } else {
        const stableMove = dist(candidate.x, candidate.y, readyReference.x, readyReference.y);

        if (stableMove > READY_STABLE_MOVE) {
          readyLockStart = performance.now();
          readyReference = { x: candidate.x, y: candidate.y };
          statusEl.textContent = "Re-stabilizing ball for lock";
        } else {
          const elapsed = performance.now() - readyLockStart;
          if (elapsed >= READY_LOCK_MS) {
            state = STATE_LOCKED;
            lostFrames = 0;
            stopCounter = 0;

            lockPos = { x: candidate.x, y: candidate.y };
            lastPos = { x: candidate.x, y: candidate.y };
            trail = [{ x: candidate.x, y: candidate.y }];
            targetHit = false;

            lockedBallModel = {
              w: candidate.w,
              h: candidate.h,
              count: candidate.count,
              ratio: candidate.ratio
            };

            readyLockStart = null;
            readyReference = null;

            statusEl.textContent = "Ball locked — waiting for movement";
          }
        }
      }
    } else {
      readyLockStart = null;
      readyReference = null;
      statusEl.textContent = "Place ball in START circle";
    }
  }

  // -------------------------
  // STATE: LOCKED
  // Start circle is ignored now
  // -------------------------
  else if (state === STATE_LOCKED) {
    const blobs = findBlobs({
      x: lastPos.x,
      y: lastPos.y,
      r: SEARCH_RADIUS
    });

    const candidate = chooseTrackingBlob(blobs);

    if (candidate) {
      lastPos = { x: candidate.x, y: candidate.y };
      drawTrackedPoint(candidate);

      const movedFromLock = dist(candidate.x, candidate.y, lockPos.x, lockPos.y);
      if (movedFromLock >= MOTION_START_DISTANCE) {
        state = STATE_TRACKING;
        trail.push({ x: candidate.x, y: candidate.y });
        statusEl.textContent = "Motion detected — tracking putt";
      } else {
        statusEl.textContent = "Ball locked — waiting for movement";
      }
    } else {
      statusEl.textContent = "Ball locked — waiting for movement";
      drawTrackedPoint(lastPos);
    }
  }

  // -------------------------
  // STATE: TRACKING
  // Only track locked ball until it stops
  // -------------------------
  else if (state === STATE_TRACKING) {
    const blobs = findBlobs({
      x: lastPos.x,
      y: lastPos.y,
      r: SEARCH_RADIUS
    });

    const candidate = chooseTrackingBlob(blobs);

    if (candidate) {
      lostFrames = 0;

      const moveStep = dist(candidate.x, candidate.y, lastPos.x, lastPos.y);
      if (moveStep <= STOP_MOVE_THRESHOLD) {
        stopCounter++;
      } else {
        stopCounter = 0;
      }

      lastPos = { x: candidate.x, y: candidate.y };

      const prev = trail.length ? trail[trail.length - 1] : null;
      if (!prev || dist(prev.x, prev.y, candidate.x, candidate.y) > MIN_TRAIL_POINT_DIST) {
        trail.push({ x: candidate.x, y: candidate.y });
      }

      checkTargetHit(candidate);
      drawTrackedPoint(candidate);

      if (!targetHit) {
        statusEl.textContent = `Tracking — x: ${candidate.x.toFixed(0)} y: ${candidate.y.toFixed(0)}`;
      }

      if (stopCounter >= STOP_FRAMES_REQUIRED) {
        state = STATE_STOPPED;
        rearmStartTime = performance.now();
        statusEl.textContent = "Ball stopped — holding result";
      }
    } else {
      lostFrames++;
      drawTrackedPoint(lastPos);

      if (lostFrames > LOST_FRAMES_MAX) {
        // If temporarily lost after movement, treat as stopped rather than immediately rearming
        state = STATE_STOPPED;
        rearmStartTime = performance.now();
        statusEl.textContent = "Ball lost / stopped — holding result";
      }
    }
  }

  // -------------------------
  // STATE: STOPPED
  // Freeze the result, then transition into rearm wait
  // -------------------------
  else if (state === STATE_STOPPED) {
    drawTrackedPoint(lastPos);
    state = STATE_REARM_WAIT;
    if (rearmStartTime === null) rearmStartTime = performance.now();
  }

  // -------------------------
  // STATE: REARM_WAIT
  // Keep path visible for 6 seconds, then rearm
  // -------------------------
  else if (state === STATE_REARM_WAIT) {
    drawTrackedPoint(lastPos);

    const elapsed = performance.now() - rearmStartTime;
    const remaining = Math.max(0, Math.ceil((REARM_DELAY_MS - elapsed) / 1000));

    if (!targetHit) {
      statusEl.textContent = `Holding result — rearming in ${remaining}s`;
    }

    if (elapsed >= REARM_DELAY_MS) {
      resetTrackingSystem();
      statusEl.textContent = "Rearmed — place ball in START circle";
    }
  }
}

updateScore();
initCameraAccess();
</script>

</body>
</html>
