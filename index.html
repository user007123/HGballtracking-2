<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HoverGreens Ball Tracker Test</title>
<style>
  body {
    background: #000;
    color: #0f0;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 10px;
  }

  button, select {
    margin: 6px;
    padding: 8px 12px;
    background: #000;
    border: 1px solid #0f0;
    color: #0f0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }

  #status, #score {
    margin: 8px;
    font-size: 18px;
  }

  #controls {
    margin-bottom: 10px;
  }

  video {
    display: none;
  }

  canvas {
    display: block;
    margin: 6px auto;
    background: #000;
    border: 1px solid #0f0;
  }
</style>
</head>
<body>

<div id="controls">
  <button id="reset">Reset</button>
  <button id="refreshCams">Refresh Cameras</button>
  <select id="cameraSelect"></select>
  <button id="startCam">Start Selected Camera</button>
</div>

<div id="status">Starting camera…</div>
<div id="score">Score: 0</div>

<video id="cam" autoplay playsinline muted></video>
<canvas id="view" width="960" height="540"></canvas>

<script>
const video = document.getElementById("cam");
const canvas = document.getElementById("view");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const statusEl = document.getElementById("status");
const scoreEl = document.getElementById("score");
const resetBtn = document.getElementById("reset");
const cameraSelect = document.getElementById("cameraSelect");
const refreshCamsBtn = document.getElementById("refreshCams");
const startCamBtn = document.getElementById("startCam");

// ===== SETTINGS =====
const START_CIRCLE = {
  x: canvas.width - 120,
  y: canvas.height / 2,
  r: 35
};

const TARGET_CIRCLE = {
  x: 120,
  y: canvas.height / 2,
  r: 40
};

// Detection tuning
const SEARCH_RADIUS = 95;
const MIN_PIXELS = 20;
const BRIGHT_MIN = 150;
const SAT_MAX = 70;
const LOST_FRAMES_MAX = 12;

// Ball-lock tuning
const MAX_JUMP = 55;
const SIZE_TOLERANCE = 2.2;
const MAX_PIXELCOUNT_SCALE = 3.2;
const MAX_RATIO = 2.0;

// Ready-lock tuning
const READY_LOCK_MS = 400;     // ball must sit in start circle this long
const READY_STABLE_MOVE = 14;  // movement allowed while arming lock

// ===== STATE =====
let started = false;
let locked = false;
let lostFrames = 0;
let lastPos = null;
let trail = [];
let score = 0;
let targetHit = false;

let currentStream = null;
let animationStarted = false;

// ready-lock state
let readyLockStart = null;
let readyReference = null;

// locked ball model
let lockedBallModel = null;

// ===== CAMERA SETUP =====
async function initCameraAccess() {
  try {
    const tempStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    currentStream = tempStream;
    video.srcObject = tempStream;

    await new Promise(resolve => {
      video.onloadedmetadata = () => {
        video.play();
        resolve();
      };
    });

    await populateCameraList();

    if (!animationStarted) {
      animationStarted = true;
      requestAnimationFrame(loop);
    }

    statusEl.textContent = "Place ball in START circle and hold briefly";
  } catch (err) {
    statusEl.textContent = "Camera error: " + err.message;
  }
}

async function populateCameraList() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === "videoinput");

    cameraSelect.innerHTML = "";

    videoDevices.forEach((device, index) => {
      const option = document.createElement("option");
      option.value = device.deviceId;
      option.textContent = device.label || `Camera ${index + 1}`;
      cameraSelect.appendChild(option);
    });

    if (videoDevices.length === 0) {
      const option = document.createElement("option");
      option.textContent = "No cameras found";
      option.value = "";
      cameraSelect.appendChild(option);
    }
  } catch (err) {
    statusEl.textContent = "Could not list cameras: " + err.message;
  }
}

async function startSelectedCamera() {
  const deviceId = cameraSelect.value;
  if (!deviceId) {
    statusEl.textContent = "No camera selected";
    return;
  }

  try {
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        deviceId: { exact: deviceId },
        width: { ideal: 1280 },
        height: { ideal: 720 },
        frameRate: { ideal: 60, max: 60 }
      },
      audio: false
    });

    currentStream = stream;
    video.srcObject = stream;

    await new Promise(resolve => {
      video.onloadedmetadata = () => {
        video.play();
        resolve();
      };
    });

    resetTrackingOnly();
    statusEl.textContent = "Camera switched — place ball in START circle and hold briefly";
  } catch (err) {
    statusEl.textContent = "Could not start selected camera: " + err.message;
  }
}

// ===== RESET =====
function resetTrackingOnly() {
  started = false;
  locked = false;
  lostFrames = 0;
  lastPos = null;
  trail = [];
  targetHit = false;
  readyLockStart = null;
  readyReference = null;
  lockedBallModel = null;
}

resetBtn.onclick = () => {
  resetTrackingOnly();
  statusEl.textContent = "Reset — place ball in START circle and hold briefly";
  updateScore();
};

refreshCamsBtn.onclick = async () => {
  await populateCameraList();
  statusEl.textContent = "Camera list refreshed";
};

startCamBtn.onclick = async () => {
  await startSelectedCamera();
};

// ===== HELPERS =====
function updateScore() {
  scoreEl.textContent = `Score: ${score}`;
}

function dist(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

function isWhiteLike(r, g, b) {
  const bright = (r + g + b) / 3;
  const sat = Math.max(r, g, b) - Math.min(r, g, b);
  return bright >= BRIGHT_MIN && sat <= SAT_MAX;
}

function findObject(searchArea = null, useLockedModel = false) {
  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = frame.data;

  let minX = searchArea ? Math.max(0, Math.floor(searchArea.x - searchArea.r)) : 0;
  let maxX = searchArea ? Math.min(canvas.width - 1, Math.floor(searchArea.x + searchArea.r)) : canvas.width - 1;
  let minY = searchArea ? Math.max(0, Math.floor(searchArea.y - searchArea.r)) : 0;
  let maxY = searchArea ? Math.min(canvas.height - 1, Math.floor(searchArea.y + searchArea.r)) : canvas.height - 1;

  let sumX = 0;
  let sumY = 0;
  let count = 0;
  let boxMinX = Infinity, boxMaxX = -Infinity;
  let boxMinY = Infinity, boxMaxY = -Infinity;

  for (let y = minY; y <= maxY; y++) {
    for (let x = minX; x <= maxX; x++) {
      if (searchArea && dist(x, y, searchArea.x, searchArea.y) > searchArea.r) continue;

      const i = (y * canvas.width + x) * 4;
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      if (isWhiteLike(r, g, b)) {
        sumX += x;
        sumY += y;
        count++;

        if (x < boxMinX) boxMinX = x;
        if (x > boxMaxX) boxMaxX = x;
        if (y < boxMinY) boxMinY = y;
        if (y > boxMaxY) boxMaxY = y;
      }
    }
  }

  if (count < MIN_PIXELS) return null;

  const w = Math.max(1, boxMaxX - boxMinX);
  const h = Math.max(1, boxMaxY - boxMinY);
  const ratio = w > h ? w / h : h / w;

  // reject long/skinny objects like shafts or streaks
  if (ratio > MAX_RATIO) return null;

  const result = {
    x: sumX / count,
    y: sumY / count,
    count,
    w,
    h,
    ratio
  };

  if (useLockedModel && lockedBallModel) {
    if (result.w > lockedBallModel.w * SIZE_TOLERANCE) return null;
    if (result.h > lockedBallModel.h * SIZE_TOLERANCE) return null;
    if (result.count > lockedBallModel.count * MAX_PIXELCOUNT_SCALE) return null;
  }

  return result;
}

function drawStartCircle() {
  let color = "#00ff00";

  if (readyLockStart && !locked) {
    color = "#ffff00";
  }

  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(START_CIRCLE.x, START_CIRCLE.y, START_CIRCLE.r, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = color;
  ctx.font = "16px Arial";
  ctx.fillText(locked ? "LOCKED" : (readyLockStart ? "READY" : "START"), START_CIRCLE.x - 30, START_CIRCLE.y - 48);
}

function drawTargetCircle() {
  ctx.strokeStyle = targetHit ? "#ff0000" : "#00ff00";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(TARGET_CIRCLE.x, TARGET_CIRCLE.y, TARGET_CIRCLE.r, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = targetHit ? "#ff0000" : "#00ff00";
  ctx.font = "16px Arial";
  ctx.fillText("TARGET", TARGET_CIRCLE.x - 34, TARGET_CIRCLE.y - 52);
}

function drawTrail() {
  if (trail.length < 2) return;
  ctx.strokeStyle = "#00ff00";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(trail[0].x, trail[0].y);
  for (let i = 1; i < trail.length; i++) {
    ctx.lineTo(trail[i].x, trail[i].y);
  }
  ctx.stroke();
}

function drawTrackedPoint(pos) {
  ctx.fillStyle = "#00ff00";
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 6, 0, Math.PI * 2);
  ctx.fill();
}

function drawReadyProgress() {
  if (!readyLockStart || locked) return;

  const elapsed = performance.now() - readyLockStart;
  const progress = Math.max(0, Math.min(1, elapsed / READY_LOCK_MS));

  const barW = 140;
  const barH = 10;
  const x = START_CIRCLE.x - barW / 2;
  const y = START_CIRCLE.y + START_CIRCLE.r + 18;

  ctx.strokeStyle = "#00ff00";
  ctx.strokeRect(x, y, barW, barH);

  ctx.fillStyle = "#ffff00";
  ctx.fillRect(x, y, barW * progress, barH);
}

function checkTargetHit(pos) {
  if (targetHit) return;

  const d = dist(pos.x, pos.y, TARGET_CIRCLE.x, TARGET_CIRCLE.y);
  if (d <= TARGET_CIRCLE.r) {
    targetHit = true;
    score++;
    updateScore();
    statusEl.textContent = "Point scored!";
  }
}

// ===== MAIN LOOP =====
function loop() {
  requestAnimationFrame(loop);

  if (!video.videoWidth || !video.videoHeight) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  drawStartCircle();
  drawTargetCircle();
  drawTrail();
  drawReadyProgress();

  let result = null;

  // ===== BEFORE LOCK =====
  if (!locked) {
    result = findObject({
      x: START_CIRCLE.x,
      y: START_CIRCLE.y,
      r: START_CIRCLE.r + 24
    }, false);

    if (result) {
      const d = dist(result.x, result.y, START_CIRCLE.x, START_CIRCLE.y);

      if (d <= START_CIRCLE.r + 8) {
        if (!readyLockStart) {
          readyLockStart = performance.now();
          readyReference = { x: result.x, y: result.y };
          statusEl.textContent = "Ball detected — hold steady for lock";
        } else {
          const stableMove = dist(result.x, result.y, readyReference.x, readyReference.y);

          if (stableMove > READY_STABLE_MOVE) {
            readyLockStart = performance.now();
            readyReference = { x: result.x, y: result.y };
            statusEl.textContent = "Re-stabilizing ball for lock";
          } else {
            const elapsed = performance.now() - readyLockStart;
            if (elapsed >= READY_LOCK_MS) {
              locked = true;
              started = true;
              lastPos = result;
              trail = [{ x: result.x, y: result.y }];
              targetHit = false;
              lostFrames = 0;

              lockedBallModel = {
                w: result.w,
                h: result.h,
                count: result.count
              };

              statusEl.textContent = "Tracking locked";
            }
          }
        }
      } else {
        readyLockStart = null;
        readyReference = null;
        statusEl.textContent = "Place ball in START circle";
      }
    } else {
      readyLockStart = null;
      readyReference = null;
      statusEl.textContent = "Place ball in START circle";
    }
  }

  // ===== AFTER LOCK =====
  else {
    result = findObject({
      x: lastPos.x,
      y: lastPos.y,
      r: SEARCH_RADIUS
    }, true);

    if (result) {
      const jump = dist(result.x, result.y, lastPos.x, lastPos.y);
      if (jump > MAX_JUMP) {
        result = null;
      }
    }

    if (result) {
      lostFrames = 0;
      lastPos = result;

      const prev = trail.length ? trail[trail.length - 1] : null;
      if (!prev || dist(prev.x, prev.y, result.x, result.y) > 2) {
        trail.push({ x: result.x, y: result.y });
      }

      checkTargetHit(result);

      if (!targetHit) {
        statusEl.textContent = `Tracking — x: ${result.x.toFixed(0)} y: ${result.y.toFixed(0)}`;
      }
    } else {
      lostFrames++;
      if (lostFrames > LOST_FRAMES_MAX) {
        locked = false;
        lastPos = null;
        readyLockStart = null;
        readyReference = null;
        lockedBallModel = null;
        statusEl.textContent = "Lost ball — return to START circle";
      }
    }
  }

  if (lastPos) {
    drawTrackedPoint(lastPos);
  }
}

updateScore();
initCameraAccess();
</script>

</body>
</html>
