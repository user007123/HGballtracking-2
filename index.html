<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HoverGreens Ball Tracker Test</title>
<style>
  body {
    background: #000;
    color: #0f0;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 10px;
  }

  button {
    margin: 6px;
    padding: 8px 12px;
    background: #000;
    border: 1px solid #0f0;
    color: #0f0;
    border-radius: 6px;
    cursor: pointer;
  }

  #status, #score {
    margin: 8px;
    font-size: 18px;
  }

  video {
    display: none;
  }

  canvas {
    display: block;
    margin: 6px auto;
    background: #000;
    border: 1px solid #0f0;
  }
</style>
</head>
<body>

<button id="reset">Reset</button>
<div id="status">Starting camera…</div>
<div id="score">Score: 0</div>

<video id="cam" autoplay playsinline muted></video>
<canvas id="view" width="960" height="540"></canvas>

<script>
const video = document.getElementById("cam");
const canvas = document.getElementById("view");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const statusEl = document.getElementById("status");
const scoreEl = document.getElementById("score");
const resetBtn = document.getElementById("reset");

// --- settings ---
const START_CIRCLE = {
  x: canvas.width - 120,
  y: canvas.height / 2,
  r: 35
};

const TARGET_CIRCLE = {
  x: 120,
  y: canvas.height / 2,
  r: 40
};

const SEARCH_RADIUS = 70;
const MIN_PIXELS = 40;
const BRIGHT_MIN = 210;
const SAT_MAX = 40;
const LOST_FRAMES_MAX = 10;

let started = false;
let locked = false;
let lostFrames = 0;
let lastPos = null;
let trail = [];
let score = 0;
let targetHit = false;

// Start camera
navigator.mediaDevices.getUserMedia({
  video: {
    width: { ideal: 1280 },
    height: { ideal: 720 },
    frameRate: { ideal: 30, max: 60 },
    facingMode: "user"
  }
}).then(stream => {
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    video.play();
    statusEl.textContent = "Place white paper circle in right-side START circle";
    requestAnimationFrame(loop);
  };
}).catch(err => {
  statusEl.textContent = "Camera error: " + err.message;
});

resetBtn.onclick = () => {
  started = false;
  locked = false;
  lostFrames = 0;
  lastPos = null;
  trail = [];
  targetHit = false;
  statusEl.textContent = "Reset — place white paper circle in right-side START circle";
  updateScore();
};

function updateScore() {
  scoreEl.textContent = `Score: ${score}`;
}

function dist(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

function isWhiteLike(r, g, b) {
  const bright = (r + g + b) / 3;
  const sat = Math.max(r, g, b) - Math.min(r, g, b);
  return bright >= BRIGHT_MIN && sat <= SAT_MAX;
}

function findObject(searchArea = null) {
  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = frame.data;

  let minX = searchArea ? Math.max(0, Math.floor(searchArea.x - searchArea.r)) : 0;
  let maxX = searchArea ? Math.min(canvas.width - 1, Math.floor(searchArea.x + searchArea.r)) : canvas.width - 1;
  let minY = searchArea ? Math.max(0, Math.floor(searchArea.y - searchArea.r)) : 0;
  let maxY = searchArea ? Math.min(canvas.height - 1, Math.floor(searchArea.y + searchArea.r)) : canvas.height - 1;

  let sumX = 0;
  let sumY = 0;
  let count = 0;
  let boxMinX = Infinity, boxMaxX = -Infinity;
  let boxMinY = Infinity, boxMaxY = -Infinity;

  for (let y = minY; y <= maxY; y++) {
    for (let x = minX; x <= maxX; x++) {
      if (searchArea && dist(x, y, searchArea.x, searchArea.y) > searchArea.r) continue;

      const i = (y * canvas.width + x) * 4;
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      if (isWhiteLike(r, g, b)) {
        sumX += x;
        sumY += y;
        count++;

        if (x < boxMinX) boxMinX = x;
        if (x > boxMaxX) boxMaxX = x;
        if (y < boxMinY) boxMinY = y;
        if (y > boxMaxY) boxMaxY = y;
      }
    }
  }

  if (count < MIN_PIXELS) return null;

  const w = boxMaxX - boxMinX;
  const h = boxMaxY - boxMinY;
  const ratio = w > h ? w / Math.max(h, 1) : h / Math.max(w, 1);

  // Reject long white streaks
  if (ratio > 1.8) return null;

  return {
    x: sumX / count,
    y: sumY / count,
    count,
    w,
    h
  };
}

function drawStartCircle() {
  ctx.strokeStyle = "#00ff00";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(START_CIRCLE.x, START_CIRCLE.y, START_CIRCLE.r, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = "#00ff00";
  ctx.font = "16px Arial";
  ctx.fillText("START", START_CIRCLE.x - 28, START_CIRCLE.y - 48);
}

function drawTargetCircle() {
  ctx.strokeStyle = targetHit ? "#ff0000" : "#00ff00";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(TARGET_CIRCLE.x, TARGET_CIRCLE.y, TARGET_CIRCLE.r, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = targetHit ? "#ff0000" : "#00ff00";
  ctx.font = "16px Arial";
  ctx.fillText("TARGET", TARGET_CIRCLE.x - 34, TARGET_CIRCLE.y - 52);
}

function drawTrail() {
  if (trail.length < 2) return;
  ctx.strokeStyle = "#00ff00";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(trail[0].x, trail[0].y);
  for (let i = 1; i < trail.length; i++) {
    ctx.lineTo(trail[i].x, trail[i].y);
  }
  ctx.stroke();
}

function drawTrackedPoint(pos) {
  ctx.fillStyle = "#00ff00";
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 6, 0, Math.PI * 2);
  ctx.fill();
}

function checkTargetHit(pos) {
  if (targetHit) return;

  const d = dist(pos.x, pos.y, TARGET_CIRCLE.x, TARGET_CIRCLE.y);
  if (d <= TARGET_CIRCLE.r) {
    targetHit = true;
    score++;
    updateScore();
    statusEl.textContent = "Point scored!";
  }
}

function loop() {
  requestAnimationFrame(loop);

  // Draw single camera view
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Overlay graphics
  drawStartCircle();
  drawTargetCircle();
  drawTrail();

  let result = null;

  if (!locked) {
    // Search near start circle until object enters it
    result = findObject({
      x: START_CIRCLE.x,
      y: START_CIRCLE.y,
      r: START_CIRCLE.r + 20
    });

    if (result) {
      const d = dist(result.x, result.y, START_CIRCLE.x, START_CIRCLE.y);
      if (d <= START_CIRCLE.r + 10) {
        locked = true;
        started = true;
        lastPos = result;
        trail = [{ x: result.x, y: result.y }];
        targetHit = false;
        statusEl.textContent = "Tracking started";
      }
    }
  } else {
    // Track around last known position
    result = findObject({
      x: lastPos.x,
      y: lastPos.y,
      r: SEARCH_RADIUS
    });

    if (result) {
      lostFrames = 0;
      lastPos = result;

      const prev = trail.length ? trail[trail.length - 1] : null;
      if (!prev || dist(prev.x, prev.y, result.x, result.y) > 2) {
        trail.push({ x: result.x, y: result.y });
      }

      checkTargetHit(result);

      if (!targetHit) {
        statusEl.textContent = `Tracking — x: ${result.x.toFixed(0)} y: ${result.y.toFixed(0)}`;
      }
    } else {
      lostFrames++;
      if (lostFrames > LOST_FRAMES_MAX) {
        locked = false;
        lastPos = null;
        statusEl.textContent = "Lost object — move white circle back to START";
      }
    }
  }

  if (lastPos) {
    drawTrackedPoint(lastPos);
  }
}

updateScore();
</script>

</body>
</html>
